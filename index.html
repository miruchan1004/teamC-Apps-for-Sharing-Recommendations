<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン画面</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="card" aria-label="ログイン画面">
    <section class="view is-active" data-view="login">
      <h1>ログイン</h1>
      <p class="subtitle">IDとパスワードを入力してください</p>

      <form class="form" id="loginForm" novalidate>
        <label for="userId">
          ID入力
          <input id="userId" name="userId" type="text" autocomplete="username" required />
        </label>

        <label for="password">
          パスワード入力
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </label>

        <button type="submit">ログイン</button>
        <p class="error" id="errorMessage" aria-live="polite"></p>
      </form>
    </section>

    <section class="view" data-view="name">
      <h1>名前表示画面</h1>
      <p class="subtitle">ログイン情報を確認しました</p>
      <div class="name-panel" id="namePanel"></div>
      <button type="button" class="back" id="backButton">戻る</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
