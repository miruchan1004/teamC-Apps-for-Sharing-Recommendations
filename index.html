<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>teamC-Apps-for-Sharing-Recommendations</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe8;
      --panel: rgba(255, 255, 255, 0.78);
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --accent-soft: rgba(15, 118, 110, 0.12);
      --shadow: 0 18px 50px rgba(31, 41, 55, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.16), transparent 30%),
        radial-gradient(circle at bottom right, rgba(245, 158, 11, 0.14), transparent 34%),
        linear-gradient(180deg, #fffaf3 0%, var(--bg) 100%);
    }

    .app {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .screen {
      width: min(100%, 420px);
      min-height: min(100vh - 48px, 760px);
      background: var(--panel);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 28px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .screen::before {
      content: "";
      position: absolute;
      inset: auto -20% -18% auto;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(15, 118, 110, 0.08);
      pointer-events: none;
    }

    .screen__body {
      min-height: inherit;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: 28px 20px 20px;
      position: relative;
      z-index: 1;
    }

    .view {
      display: none;
      height: 100%;
      align-content: center;
    }

    .view.is-active {
      display: grid;
      gap: 18px;
      animation: fadeIn 180ms ease-out;
    }

    .home-view {
      justify-items: center;
      align-content: end;
      padding-bottom: 12px;
    }

    .home-copy {
      font-size: 1.1rem;
      color: var(--muted);
      text-align: center;
    }

    .search-view {
      justify-items: center;
      align-content: start;
      padding-top: 36px;
      gap: 14px;
    }

    .mypage-view {
      justify-items: center;
      align-content: center;
      gap: 14px;
    }

    .label-box {
      padding: 18px 26px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(15, 118, 110, 0.12);
      box-shadow: 0 10px 30px rgba(31, 41, 55, 0.08);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .search-field {
      width: min(100%, 320px);
      border-radius: 999px;
      border: 1px solid rgba(15, 118, 110, 0.16);
      background: #fff;
      padding: 15px 18px;
      color: var(--muted);
      text-align: center;
      box-shadow: 0 10px 24px rgba(31, 41, 55, 0.07);
    }

    .section-list {
      display: grid;
      gap: 10px;
      width: min(100%, 320px);
    }

    .section-item {
      padding: 14px 18px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(15, 118, 110, 0.1);
      text-align: center;
      color: var(--text);
      font-weight: 600;
    }

    .nav {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      align-self: end;
      margin-top: 24px;
      padding: 12px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(15, 118, 110, 0.12);
    }

    .nav button {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-weight: 700;
      padding: 14px 10px;
      border-radius: 16px;
      cursor: pointer;
    }

    .nav button.is-active {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .nav button:focus-visible {
      outline: 3px solid rgba(15, 118, 110, 0.28);
      outline-offset: 2px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .app {
        padding: 0;
      }

      .screen {
        width: 100%;
        min-height: 100vh;
        border-radius: 0;
      }

      .screen__body {
        padding: 20px 16px 16px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="screen" aria-label="アプリ画面">
      <div class="screen__body">
        <div class="view home-view is-active" data-view="home" aria-label="ホーム画面">
          <div class="home-copy">アプリを開くとホーム画面が表示されます。</div>
        </div>

        <div class="view search-view" data-view="search" aria-label="検索画面">
          <div class="search-field">検索欄</div>
          <div class="label-box">検索履歴</div>
        </div>

        <div class="view mypage-view" data-view="mypage" aria-label="マイページ画面">
          <div class="label-box">アイコン</div>
          <div class="section-list">
            <div class="section-item">閲覧履歴</div>
            <div class="section-item">いいね欄</div>
            <div class="section-item">プロフィール</div>
          </div>
        </div>

        <nav class="nav" aria-label="メインナビゲーション">
          <button type="button" class="is-active" data-target="home" aria-pressed="true">ホーム</button>
          <button type="button" data-target="search" aria-pressed="false">検索</button>
          <button type="button" data-target="mypage" aria-pressed="false">マイページ</button>
        </nav>
      </div>
    </section>
  </main>

  <script>
    const navButtons = Array.from(document.querySelectorAll(".nav button"));
    const views = Array.from(document.querySelectorAll(".view"));

    const setActiveView = (target) => {
      navButtons.forEach((button) => {
        const isActive = button.dataset.target === target;
        button.classList.toggle("is-active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      views.forEach((view) => {
        view.classList.toggle("is-active", view.dataset.view === target);
      });
    };

    navButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setActiveView(button.dataset.target);
      });
    });
  </script>
</body>
</html>
