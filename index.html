<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>teamC-Apps-for-Sharing-Recommendations</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="app" aria-label="teamC アプリ">
    <section class="screen">
      <div class="screen__body">
        <section class="view login-view is-active" data-view="login" aria-label="ログイン画面">
          <h1>ログイン</h1>
          <p class="subtitle">IDとパスワードを入力してください</p>

          <form class="form" id="loginForm" novalidate>
            <label for="userId">
              ID入力
              <input id="userId" name="userId" type="text" autocomplete="username" required />
            </label>

            <label for="password">
              パスワード入力
              <div class="password-field">
                <input id="password" name="password" type="password" autocomplete="current-password" required />
                <button
                  type="button"
                  class="password-toggle"
                  id="passwordToggle"
                  aria-controls="password"
                  aria-pressed="false"
                  aria-label="パスワードを表示"
                  title="パスワードを表示"
                >
                  <svg class="password-toggle__icon password-toggle__icon--eye" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M2.2 12s3.6-6.2 9.8-6.2 9.8 6.2 9.8 6.2-3.6 6.2-9.8 6.2S2.2 12 2.2 12Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                    <circle cx="12" cy="12" r="2.8" fill="none" stroke="currentColor" stroke-width="1.8" />
                  </svg>
                  <svg class="password-toggle__icon password-toggle__icon--eye-off" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M2.2 12s3.6-6.2 9.8-6.2 9.8 6.2 9.8 6.2-3.6 6.2-9.8 6.2S2.2 12 2.2 12Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                    <circle cx="12" cy="12" r="2.8" fill="none" stroke="currentColor" stroke-width="1.8" />
                    <line x1="4" y1="20" x2="20" y2="4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                  </svg>
                  <span class="sr-only">パスワード表示切り替え</span>
                </button>
              </div>
            </label>

            <button type="submit">ログイン</button>
            <p class="error" id="errorMessage" aria-live="polite"></p>
          </form>
        </section>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
