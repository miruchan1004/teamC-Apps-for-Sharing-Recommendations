<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>teamC-Apps-for-Sharing-Recommendations</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="app" aria-label="teamC アプリ">
    <section class="screen">
      <div class="screen__body">
        <section class="view login-view is-active" data-view="login" aria-label="ログイン画面">
          <h1>ログイン</h1>
          <p class="subtitle">IDとパスワードを入力してください</p>

          <form class="form" id="loginForm" novalidate>
            <label for="userId">
              ID入力
              <input id="userId" name="userId" type="text" autocomplete="username" required />
            </label>

            <label for="password">
              パスワード入力
              <span class="password-field">
                <input id="password" name="password" type="password" autocomplete="current-password" required />
                <button type="button" class="password-toggle" id="passwordToggle" aria-pressed="false">表示</button>
              </span>
            </label>

            <button type="submit">ログイン</button>
            <p class="error" id="errorMessage" aria-live="polite"></p>
          </form>
        </section>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
